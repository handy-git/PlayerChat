# 第一次修改语言文件，需重启生效
language: zh_CN

# 子服标识，群组服需先配置这个
server: "lobby"

# 子服自定义名称
# 可以用 papi 变量 %playerChat_server_name% 读取 或者内部变量 ${serverName} 读取
serverName: ""

# 命令别名
# 格式：别名："替换为"
# 例如：/tell xxx -> /plc tell xxx
commandAlias:
  tell: "plc tell"
  msg: "plc tell"
  mute: "plc mute"
  unmute: "plc unmute"

# 玩家第一次登录后的默认频道
# 注意 如果修改为其他频道，请把对应的权限提前给予 查看：playerChat.chat.频道名 使用：playerChat.use.频道名
firstLoginChatDefault: "default"

# 是否开启 AI 审核
ai:
  # 是否开启
  enable: false
  # AI 一天警告最大次数
  chatMaxCount: 3
  # AI 投票成功人数
  voteMaxNumber: 5
  # AI 投票成功后执行的指令
  command:
    - "plc mute ${player} 5m"
    - "lb 全服大喇叭 &a${player}&c因违规发言，已被投票禁言 5 分钟"

# 聊天冷却时间 (单位秒)(可无限扩展和修改子节点，权限格式：playerChat.chatTime.vip1)
# 0 为关闭状态
chatTime:
  # 默认玩家的时间
  default: 0
  # vip1 的上限 需要权限 playerWarp.delayTime.vip1
  vip1: 0
  # vip2 的上限 需要权限 playerWarp.delayTime.vip2
  vip2: 0
  # vip3 的上限 需要权限 playerWarp.delayTime.vip3
  vip3: 0

# 聊天黑名单
blacklist:
  - '操'
  - '草'
  - 'cao'
  - '%'

# 是否开启更新提醒，建议开启
isCheckUpdate: true

# op 登录时候是否发送更新提醒
isCheckUpdateToOpMsg: true

# 物品展示安全设置 (防止 NBT 过大导致客户端崩溃)
itemSafety:
  # 是否启用安全检查
  enable: true
  # 最大允许的 NBT 大小 (字节，默认 8KB)
  maxNbtSize: 8192
  # 最大允许的 Lore 行数
  maxLoreLines: 20
  # 最大允许的物品名称长度
  maxNameLength: 50
  # 超过限制时的提示消息
  tooLargeMessage: "&c[展示物品] &7物品数据过大或包含复杂 NBT，无法安全展示"
