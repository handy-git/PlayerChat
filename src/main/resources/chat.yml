# 展示物品
item:
  # 是否开启
  enable: true
  # 展示格式
  format: "[i]"
  # 内容格式
  content: "${sprite}&5[&a${item}&5]"
  # 物品名称长度限制 多余的会显示为...
  length: 18

# @
at:
  # 是否开启
  enable: true
  # 音效列表 https://bukkit.windit.net/javadoc/org/bukkit/Sound.html
  sound: "BLOCK_ANVIL_LAND"
  # 是否保留@符号
  keepAt: false
  # @默认的颜色
  atColor: "&9"

# 聊天管理 频道可无限根据下面格式添加
# 自定义频道权限 查看: playerChat.chat.频道名 使用: playerChat.use.频道名
# 内部变量 ${player} 玩家名 ${channel} 频道名
# clickSuggest 点击后补全在输入框的内容 click 点击后自动执行的内容
# 对应频道附近的人配置格式 range: 6,6,6
chat:
  # 默认频道(严禁删除本频道)
  default:
    # 是否开启
    enable: true
    # 频道名称
    name: "&7[&a默认频道&7]"
    # 聊天自定义节点 你可以自定义无数节点 支持变量
    format:
      # 自定义的前缀节点
      prefix:
        text: '${channel}%playerTitle_use%'
        # 1.16+可用hover
        hover:
          - '&8▪ &6所在聊天频道: ${channel}'
          - '&8▪ &6点击可执行命令/spawn'
        # 点击后执行的命令
        click: '/spawn'
      # 自定义的需要权限的前缀节点
      vipPrefix:
        # 该节点的权限 每个节点都可以自定义对应的权限,如果不配置默认不需要权限
        permission: "playerChat.chat.default.vipPrefix"
        text: '${channel}%playerTitle_use%'
        # 1.16+可用hover
        hover:
          - '&8▪ &6所在聊天频道: ${channel}'
          - '&8▪ &6点击可执行命令/spawn'
        # 点击后执行的命令
        click: '/spawn'
      # ============================================
      # 【示例】VIP条件前缀节点 - 使用conditions按权限优先级显示不同前缀
      # 格式: text=显示内容 | 权限节点
      # 注: hover/click/clickSuggest 可省略，不写则使用节点下方配置的默认值
      # ============================================
      vipConditionPrefix:
        # 节点权限（需要此权限才能使用此节点）
        permission: "playerChat.chat.default.vipConditionPrefix"
        # 条件列表（从上往下匹配，匹配到就停止）
        conditions:
          - 'text=&6&l✯ &f%playerTitle_use% | vip6'
          - 'text=&6&l✯ &f%playerTitle_use% | vip5'
          - 'text=&b&l✯ &f%playerTitle_use% | vip4'
          - 'text=&a&l✯ &f%playerTitle_use% | vip3'
          - 'text=&e&l✯ &f%playerTitle_use% | vip2'
          - 'text=&7&l✯ &f%playerTitle_use% | vip1'
        # 节点默认的hover和click（条件里没配置时会用这里）
        hover:
          - '&8▪ &6点击查看详情'
        clickSuggest: '/msg ${player}'

      # ============================================
      # 自定义的玩家名节点
      player:
        text: '&f${head}${player}&7: '
        hover:
          - '快点击tpa我啦～'
        # 点击后执行的命令
        click: '/tpa ${player}'
      # 自定义的聊天内容节点
      msg:
        text: '&f${message}'
        hover:
          - '&7时间: %server_time_h:mm:ss a%'
        # 点击后执行的命令
        click: ''
  # 私信频道(严禁删除本频道)
  tell:
    # 是否开启
    enable: true
    # 频道名称
    name: "&7[&a私信频道&7]"
    # 聊天格式 支持变量
    format:
      # 聊天前缀
      prefix:
        text: '${channel}%playerTitle_use%'
        # 1.16+可用hover
        hover:
          - '&8▪ &6所在聊天频道: ${channel}'
          - '&8▪ &6点击可执行命令/spawn'
        # 点击后执行的命令
        click: '/spawn'
      # 聊天玩家名
      player:
        text: '&f${head}${player}&7: '
        hover:
          - '快点击tpa我啦～'
        # 点击后执行的命令
        click: '/tpa ${player}'
      # 聊天内容
      msg:
        text: '&f${message}'
        hover:
          - '&7时间: %server_time_h:mm:ss a%'
        # 点击后执行的命令
        click: ''
  # VIP频道
  vip:
    # 是否开启
    enable: true
    # 发言音效
    sound: "ENTITY_ITEM_PICKUP"
    # 频道名称
    name: "&7[&aVIP频道&7]"
    # 聊天格式 支持变量
    format:
      # 聊天前缀
      prefix:
        text: '${channel}%playerTitle_use%'
        # 1.16+可用hover
        hover:
          - '&8▪ &6所在聊天频道: ${channel}'
          - '&8▪ &6点击可执行命令/spawn'
        # 点击后执行的命令
        click: '/spawn'
      # 聊天玩家名
      player:
        text: '&f${head}${player}&7: '
        hover:
          - '快点击tpa我啦～'
        # 点击后执行的命令
        click: '/tpa ${player}'
      # 聊天内容
      msg:
        text: '&f${message}'
        hover:
          - '&7时间: %server_time_h:mm:ss a%'
        # 点击后执行的命令
        click: ''
  # 扩展公会聊天频道(需PlayerGuild才生效)
  PlayerGuild:
    # 是否开启
    enable: true
    # 频道名称
    name: "&7[&a公会频道&7]"
    # 聊天格式 支持变量
    format:
      # 聊天前缀
      prefix:
        text: '${channel}%playerGuild_show_name%'
        hover:
          - '&8▪ &6所在聊天频道: ${channel}'
          - '&8▪ &6公会聊天频道,只有公会成员可见'
        # 点击后执行的命令
        click: ''
      # 聊天玩家名
      player:
        text: '&f${head}${player}&7: '
        hover:
          - '快点击tpa我啦～'
        # 点击后执行的命令
        click: '/tpa ${player}'
      # 聊天内容
      msg:
        text: '&f${message}'
        hover:
          - '&7时间: %server_time_h:mm:ss a%'
        # 点击后执行的命令
        click: ''
